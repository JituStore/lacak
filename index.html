<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Tracking Paket</title>
</head>

<body>

<h2>Tracking Paket</h2>

<div id="hasil">Loading...</div>

<script>

const resi = new URLSearchParams(window.location.search).get("resi");

if(!resi){
document.getElementById("hasil").innerText="Resi tidak ada di link";
}else{

const api="https://api.allorigins.win/raw?url="+encodeURIComponent(
"https://app.mengantar.com/api/order/getPublic?tracking_number="+resi+"&courier=JNE"
);

fetch(api)
.then(r=>r.json())
.then(data=>{

if(!data.success){
document.getElementById("hasil").innerText="Tracking tidak ditemukan";
return;
}

let history=data.data.history;

let html="";

history.forEach(h=>{
html+="<p>"+h.date+" - "+h.desc+"</p>";
});

document.getElementById("hasil").innerHTML=html;

})
.catch(()=>{
document.getElementById("hasil").innerText="Gagal mengambil data";
});

}

</script>

</body>
</html>
